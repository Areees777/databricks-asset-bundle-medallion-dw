resources:
  jobs:
    bronze_job:
      name: bronze_job

      job_clusters:
        - job_cluster_key: tiny_cluster
          new_cluster:
            spark_version: 13.3.x-scala2.12
            node_type_id: Standard_D4ds_v4
            num_workers: 1
            autotermination_minutes: 10

      tasks:
        - task_key: run_ingest
          job_cluster_key: tiny_cluster
          libraries:
            - pypi:
                package: "openpyxl"
          spark_python_task:
            python_file: ../src/bronze/ingest.py
      
      